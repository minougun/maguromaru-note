repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.21.2
  hooks:
  - id: gitleaks
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.6
  hooks:
  - id: ruff
    args:
    - --select
    - E722,S608,S105,S110
- repo: https://github.com/semgrep/pre-commit
  rev: v1.159.0
  hooks:
  - id: semgrep
    entry: semgrep
    args:
    - --config
    - p/javascript
    - --config
    - p/owasp-top-ten
    - --config
    - .semgrep/path-traversal-node.yaml
    - --error
    - --skip-unknown-extensions
