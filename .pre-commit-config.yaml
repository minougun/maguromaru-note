# LLM生成コードの5大脆弱性を防ぐ pre-commit 設定
# 検出: E722 bare except, S608 SQLi, S105 ハードコード鍵, S110 try/except/pass,
#       gitleaks, Semgrep パストラ（semgrep/path-traversal.yml）
#
# 初回: python3 -m pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--select, "E722,S608,S105,S110"]

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.67.0
    hooks:
      - id: semgrep
        args: [--config, semgrep/path-traversal.yml, --error]
