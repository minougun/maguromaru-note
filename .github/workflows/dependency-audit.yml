name: Dependency audit

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm run audit
