name: Secret scanning helper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for obvious secrets
        uses: ZHobbs/secret-scanner-action@v1
        with:
          paths: '.'
