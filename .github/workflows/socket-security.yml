# Socket.dev Security Scan — LLM生成コードの依存関係チェック
# 検出対象: 幻覚パッケージ(typosquat), マルウェア, 危険なinstall script
#
# 前提:
#   1. https://socket.dev でアカウント作成 → API Key取得
#   2. GitHub repo Settings → Secrets → SOCKET_SECURITY_API_KEY を登録
#
# 使い方: このファイルを対象リポジトリの .github/workflows/socket-security.yml にコピー

name: Socket Security Scan

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  socket-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Run Socket scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "$PR_NUMBER"
