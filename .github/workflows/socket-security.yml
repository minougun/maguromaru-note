name: Socket Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  socket-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Skip when SOCKET_SECURITY_API_KEY is not configured
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        shell: bash
        run: |
          if [ -z "$SOCKET_SECURITY_API_KEY" ]; then
            echo "SOCKET_SECURITY_API_KEY is not configured; skipping Socket scan."
            exit 0
          fi
      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade
      - name: Run Socket Security Scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SOCKET_SECURITY_API_KEY" ]; then
            echo "SOCKET_SECURITY_API_KEY is not configured; skipping Socket scan."
            exit 0
          fi
          PR_NUMBER=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          fi
          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "$PR_NUMBER"
