name: Security blackbox

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and route security tests
        run: npm test
      - name: Build production bundle
        run: npm run build
      - name: Blackbox security smoke
        run: npm run test:security:blackbox
