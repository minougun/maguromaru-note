rules:
  - id: minou.node.path-traversal.user-input-to-filesystem
    message: Untrusted request data reaches a filesystem path sink. Use path.basename() only as a first step and prefer an allowlist helper such as normalizeAndAssertUnder().
    severity: ERROR
    languages:
      - javascript
      - typescript
    mode: taint
    metadata:
      category: security
      technology:
        - express
        - nodejs
      confidence: medium
    pattern-sources:
      - pattern-either:
          - pattern: req.params.$X
          - pattern: req.query.$X
          - pattern: req.body.$X
          - pattern: req.files[$X].originalname
          - pattern: req.file.originalname
    pattern-sanitizers:
      - pattern-either:
          - pattern: path.basename(...)
          - pattern: normalizeAndAssertUnder(...)
          - pattern: sanitizeFilename(...)
    pattern-sinks:
      - pattern-either:
          - pattern: path.join(..., $PATH, ...)
          - pattern: path.resolve(..., $PATH, ...)
          - pattern: fs.readFile($PATH, ...)
          - pattern: fs.readFileSync($PATH, ...)
          - pattern: fs.writeFile($PATH, ...)
          - pattern: fs.writeFileSync($PATH, ...)
          - pattern: fs.createReadStream($PATH, ...)
          - pattern: fs.createWriteStream($PATH, ...)
          - pattern: res.sendFile($PATH, ...)
